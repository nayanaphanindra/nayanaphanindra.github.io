---
layout: default
---
<main class="post-page">
  <div class="container">
    <a href="{{ '/blog' | relative_url }}" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      Back to Blog
    </a>

    <header class="post-hero fade-in">
      {% if page.category %}
      <span class="section-label">{{ page.category }}</span>
      {% endif %}
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <span>{{ page.date | date: "%B %d, %Y" }}</span>
        {% if page.read_time %}<span>{{ page.read_time }} min read</span>{% endif %}
      </div>
    </header>

    <article class="post-content fade-in">
      {{ content }}
    </article>
  </div>
</main>
