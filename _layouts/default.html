<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.description }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}" />
  <link rel="stylesheet" href="{{ '/assets/css/main.scss' | relative_url }}" />
  {% seo %}
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav" id="site-nav">
    <div class="container nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo">Nayana <span>Phanindra</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="{{ '/#about' | relative_url }}">About</a></li>
        <li><a href="{{ '/#experience' | relative_url }}">Experience</a></li>
        <li><a href="{{ '/#portfolio' | relative_url }}">Portfolio</a></li>
        <li><a href="{{ '/#blog' | relative_url }}">Blog</a></li>
        <li><a href="{{ '/#contact' | relative_url }}">Contact</a></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  {{ content }}

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>© {{ site.time | date: '%Y' }} {{ site.title }} · Instructional Designer · Bangalore, India</p>
    </div>
  </footer>

  <script>
    // Sticky nav shadow
    const nav = document.getElementById('site-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 20);
    });

    // Mobile menu
    const toggle = document.getElementById('nav-toggle');
    const links = document.getElementById('nav-links');
    toggle.addEventListener('click', () => links.classList.toggle('open'));

    // Intersection observer for scroll animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.fade-in, .timeline-item, .portfolio-card').forEach(el => {
      observer.observe(el);
    });
  </script>
</body>
</html>
