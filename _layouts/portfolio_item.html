---
layout: default
---
<main class="portfolio-page">
  <div class="container">
    <a href="{{ '/#portfolio' | relative_url }}" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      Back to Portfolio
    </a>

    <header class="post-hero fade-in">
      {% if page.type %}<span class="section-label">{{ page.type }}</span>{% endif %}
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        {% if page.tools %}<span>{{ page.tools }}</span>{% endif %}
        {% if page.year %}<span>{{ page.year }}</span>{% endif %}
      </div>
    </header>

    <article class="post-content fade-in">
      {{ content }}
    </article>
  </div>
</main>
