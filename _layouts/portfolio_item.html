layout: default

<style>
.portfolio-page .post-content { max-width: 100%; }
.portfolio-page .port-hero-band {
  margin-left: calc(-50vw + 50%);
  margin-right: calc(-50vw + 50%);
  margin-top: -2rem;
  margin-bottom: 3rem;
  border-radius: 0;
  padding-top: 4rem;
  padding-bottom: 3.5rem;
  padding-left: max(2rem, calc(50vw - 560px));
  padding-right: max(2rem, calc(50vw - 560px));
}
</style>

<main class="portfolio-page">
  <div class="container">
    <a href="{{ '/#portfolio' | relative_url }}" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      Back to Portfolio
    </a>
    <article class="post-content fade-in">
      {{ content }}
    </article>
  </div>
</main>
