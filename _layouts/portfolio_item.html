---
layout: default
---

{% if page.custom_css %}
  <link rel="stylesheet" href="{{ '/assets/css/' | append: page.custom_css | append: '.css' | relative_url }}">
{% endif %}

<main class="portfolio-page">
  </main>

<main class="portfolio-page">
  <div class="container">
    <a href="{{ '/#portfolio' | relative_url }}" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      Back to Portfolio
    </a>
    <article class="post-content fade-in">
      {{ content }}
    </article>
  </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const content = document.querySelector('.fade-in');
  if (content) {
    content.style.opacity = "1";
    content.style.transition = "opacity 0.8s ease-in-out";
  }
});
</script>
