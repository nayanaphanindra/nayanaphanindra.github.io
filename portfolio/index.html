---
layout: default
title: Portfolio
---

<main class="post-page">
  <div class="container">
    <header class="post-hero fade-in">
      <span class="section-label">Selected Works</span>
      <h1>Portfolio</h1>
    </header>
    <div class="portfolio-grid">
      {% assign items = site.portfolio | sort: 'date' | reverse %}
      {% for item in items %}
      <div class="portfolio-card fade-in">
        {% if item.type %}<p class="card-type">{{ item.type }}</p>{% endif %}
        <h3 class="card-title">{{ item.title }}</h3>
        <p class="card-desc">{{ item.excerpt | strip_html | truncate: 140 }}</p>
        <a href="{{ item.url | relative_url }}" class="card-link">View project →</a>
      </div>
      {% endfor %}
    </div>
  </div>
</main>
